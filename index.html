<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jason Ng | 個人作品集</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome图标 -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 配置Tailwind自定义主题 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366F1', // 主色调：紫罗兰色
                        secondary: '#EC4899', // 辅助色：粉色
                        dark: '#1E293B',
                        light: '#F8FAFC'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Montserrat', 'sans-serif']
                    },
                }
            }
        }
    </script>
    <!-- 自定义工具类 -->
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .text-shadow {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            }
            .bg-gradient-custom {
                background: linear-gradient(135deg, #6366F1 0%, #EC4899 100%);
            }
            .card-hover {
                transition: all 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-8px);
                box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            }
        }
    </style>
    <!-- 引入Google字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* 基础动画 */
        html {
            scroll-behavior: smooth;
        }
        .animate-fade-in {
            animation: fadeIn 0.8s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 加载动画 */
        .loader {
            border-top-color: #6366F1;
            animation: spinner 0.8s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #6366F1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4F46E5;
        }
    </style>
</head>
<body class="bg-light text-dark font-sans antialiased">
    <!-- 加载屏幕 -->
    <div id="loader" class="fixed inset-0 z-50 flex items-center justify-center bg-white">
        <div class="loader h-16 w-16 rounded-full border-4 border-gray-200"></div>
    </div>

    <!-- 导航栏（移除项目相关导航，只保留联络我） -->
    <nav id="navbar" class="fixed top-0 left-0 w-full z-40 transition-all duration-300 bg-white/90 backdrop-blur-md shadow-sm">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo/名稱 -->
                <a href="#hero" class="flex items-center space-x-2">
                    <span class="text-primary text-2xl font-display font-bold">Jason Ng</span>
                </a>
                
                <!-- 桌面端導航（仅保留聯絡我） -->
                <div class="hidden md:flex space-x-8">
                    <a href="#contact" class="text-dark hover:text-primary transition-colors font-medium">聯絡我</a>
                </div>
                
                <!-- 移動端菜單按鈕 -->
                <button id="menuBtn" class="md:hidden text-dark hover:text-primary focus:outline-none">
                    <i class="fa fa-bars text-xl"></i>
                </button>
            </div>
        </div>
        
        <!-- 移動端導航菜單（仅保留聯絡我） -->
        <div id="mobileMenu" class="md:hidden hidden bg-white border-t">
            <div class="container mx-auto px-4 py-3 space-y-3">
                <a href="#contact" class="block py-2 text-dark hover:text-primary transition-colors">聯絡我</a>
            </div>
        </div>
    </nav>

    <!-- 英雄區/Hero Section（调整滚动指示器指向联络我） -->
    <section id="hero" class="min-h-screen flex items-center pt-16 bg-gradient-custom text-white">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8 py-20">
            <div class="grid md:grid-cols-2 gap-12 items-center">
                <div class="animate-fade-in">
                    <h1 class="text-[clamp(2.5rem,5vw,4rem)] font-display font-bold leading-tight text-shadow mb-4">
                        嗨，我是<br><span class="text-white/90">Jason Ng</span>
                    </h1>
                    <p class="text-xl text-white/80 mb-8 max-w-lg">
                        ICT教師 / KOL
                    </p>
                    <div class="flex flex-wrap gap-4">
                        <a href="#contact" class="bg-white text-primary px-8 py-3 rounded-full font-medium hover:bg-white/90 transition-colors shadow-lg">
                            聯絡我
                        </a>
                        <a href="#contact" class="bg-transparent border-2 border-white text-white px-8 py-3 rounded-full font-medium hover:bg-white/10 transition-colors">
                            發送消息
                        </a>
                    </div>
                </div>
                <div class="relative animate-fade-in" style="animation-delay: 0.3s">
                    <div class="relative w-full max-w-md mx-auto">
                        <!-- 頭像容器 -->
                        <div class="rounded-full overflow-hidden border-8 border-white/20 shadow-2xl">
                            <img src="https://maashk.github.io/demo-plklsp/image.png" alt="個人頭像" class="w-full h-auto object-cover">
                        </div>
                        <!-- 裝飾元素 -->
                        <div class="absolute -bottom-6 -right-6 w-24 h-24 bg-secondary rounded-full opacity-80 blur-xl"></div>
                        <div class="absolute -top-6 -left-6 w-24 h-24 bg-primary rounded-full opacity-80 blur-xl"></div>
                    </div>
                </div>
            </div>
        </div>
        <!-- 向下滾動指示器（指向聯絡我） -->
        <div class="absolute bottom-10 left-1/2 transform -translate-x-1/2 animate-bounce">
            <a href="#contact" class="text-white/80 hover:text-white">
                <i class="fa fa-chevron-down text-2xl"></i>
            </a>
        </div>
    </section>

    <!-- 聯絡我部分（作为核心板块，保持完整） -->
    <section id="contact" class="py-20 bg-gray-50">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16">
                <h2 class="text-[clamp(1.8rem,3vw,2.5rem)] font-display font-bold mb-4">聯絡我</h2>
                <div class="w-20 h-1 bg-primary mx-auto"></div>
            </div>
            
            <div class="grid md:grid-cols-2 gap-12">
                <!-- 聯絡資訊 -->
                <div>
                    <h3 class="text-2xl font-display font-semibold mb-6">隨時歡迎交流</h3>
                    <p class="text-gray-700 mb-8 leading-relaxed">
                        如果你對我的作品感興趣，或者有合作、邀約等方面的查詢，都可以通過以下方式聯絡我。我會盡快回覆你的消息。
                    </p>
                    
                    <!-- 聯絡方式列表 -->
                    <div class="space-y-6 mb-8">
                        <div class="flex items-start space-x-4">
                            <div class="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center flex-shrink-0">
                                <i class="fa fa-envelope text-primary text-xl"></i>
                            </div>
                            <div>
                                <h4 class="font-medium text-lg mb-1">電郵</h4>
                                <p class="text-gray-600">nch@plklsp.edu.hk</p>
                            </div>
                        </div>
                        
                        <div class="flex items-start space-x-4">
                            <div class="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center flex-shrink-0">
                                <i class="fa fa-phone text-primary text-xl"></i>
                            </div>
                            <div>
                                <h4 class="font-medium text-lg mb-1">電話</h4>
                                <p class="text-gray-600">2498 3393</p>
                            </div>
                        </div>
                        
                        <div class="flex items-start space-x-4">
                            <div class="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center flex-shrink-0">
                                <i class="fa fa-map-marker text-primary text-xl"></i>
                            </div>
                            <div>
                                <h4 class="font-medium text-lg mb-1">地址</h4>
                                <p class="text-gray-600">新界荃灣西柴灣角荃景圍安賢街12-20號</p>
                            </div>
                        </div>
                        
                        <div class="flex items-start space-x-4">
                            <div class="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center flex-shrink-0">
                                <i class="fa fa-map-marker text-primary text-xl"></i>
                            </div>
                            <div>
                                <h4 class="font-medium text-lg mb-1">城市</h4>
                                <p class="text-gray-600">香港 (HK)</p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 社交媒體 -->
                    <div>
                        <h4 class="font-medium text-lg mb-4">社交媒體</h4>
                        <div class="flex space-x-4">
                            <a href="#" class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center text-primary hover:bg-primary hover:text-white transition-colors">
                                <i class="fa fa-github"></i>
                            </a>
                            <a href="#" class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center text-primary hover:bg-primary hover:text-white transition-colors">
                                <i class="fa fa-linkedin"></i>
                            </a>
                            <a href="#" class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center text-primary hover:bg-primary hover:text-white transition-colors">
                                <i class="fa fa-youtube-play"></i>
                            </a>
                            <a href="#" class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center text-primary hover:bg-primary hover:text-white transition-colors">
                                <i class="fa fa-instagram"></i>
                            </a>
                        </div>
                    </div>
                </div>
                
                <!-- 聯絡表單 -->
                <div class="bg-white p-8 rounded-xl shadow-lg">
                    <h3 class="text-2xl font-display font-semibold mb-6">發送消息</h3>
                    <form>
                        <div class="grid sm:grid-cols-2 gap-6 mb-6">
                            <div>
                                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">姓名</label>
                                <input type="text" id="name" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-colors" placeholder="你的名字">
                            </div>
                            <div>
                                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">電郵</label>
                                <input type="email" id="email" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-colors" placeholder="your@email.com">
                            </div>
                        </div>
                        
                        <div class="mb-6">
                            <label for="subject" class="block text-sm font-medium text-gray-700 mb-1">主題</label>
                            <input type="text" id="subject" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-colors" placeholder="消息主題">
                        </div>
                        
                        <div class="mb-6">
                            <label for="message" class="block text-sm font-medium text-gray-700 mb-1">消息內容</label>
                            <textarea id="message" rows="5" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-colors" placeholder="請輸入你的消息..."></textarea>
                        </div>
                        
                        <button type="submit" class="w-full bg-primary text-white py-3 px-6 rounded-lg font-medium hover:bg-primary/90 transition-colors">
                            發送消息 <i class="fa fa-paper-plane ml-2"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- 頁腳 -->
    <footer class="bg-dark text-white py-12">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid md:grid-cols-2 gap-8 items-center">
                <div>
                    <h3 class="text-2xl font-display font-bold mb-4">Jason Ng</h3>
                    <p class="text-gray-400 max-w-md">
                        ICT教師 / KOL，致力於科技教育推廣和數碼素養提升，分享實用的教育資源和技術知識。
                    </p>
                </div>
                
                <div class="text-right">
                    <p class="text-gray-400 mb-4">© 2025 Jason Ng. 保留所有權利。</p>
                    <div class="flex justify-end space-x-4">
                        <a href="#" class="text-gray-400 hover:text-white transition-colors">
                            <i class="fa fa-github text-xl"></i>
                        </a>
                        <a href="#" class="text-gray-400 hover:text-white transition-colors">
                            <i class="fa fa-linkedin text-xl"></i>
                        </a>
                        <a href="#" class="text-gray-400 hover:text-white transition-colors">
                            <i class="fa fa-youtube-play text-xl"></i>
                        </a>
                        <a href="#" class="text-gray-400 hover:text-white transition-colors">
                            <i class="fa fa-instagram text-xl"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <!-- JavaScript（调整相关跳转逻辑，移除项目相关观察） -->
    <script>
        // 頁面加載完成後隱藏加載動畫
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                const loader = document.getElementById('loader');
                loader.classList.add('opacity-0');
                setTimeout(function() {
                    loader.style.display = 'none';
                }, 500);
            }, 800);
            
            // 移動端菜單切換
            const menuBtn = document.getElementById('menuBtn');
            const mobileMenu = document.getElementById('mobileMenu');
            
            menuBtn.addEventListener('click', function() {
                mobileMenu.classList.toggle('hidden');
                // 切換圖標
                const icon = menuBtn.querySelector('i');
                if (icon.classList.contains('fa-bars')) {
                    icon.classList.remove('fa-bars');
                    icon.classList.add('fa-times');
                } else {
                    icon.classList.remove('fa-times');
                    icon.classList.add('fa-bars');
                }
            });
            
            // 導航欄滾動效果
            const navbar = document.getElementById('navbar');
            window.addEventListener('scroll', function() {
                if (window.scrollY > 50) {
                    navbar.classList.add('shadow-md');
                    navbar.classList.remove('bg-white/90');
                    navbar.classList.add('bg-white');
                } else {
                    navbar.classList.remove('shadow-md');
                    navbar.classList.add('bg-white/90');
                    navbar.classList.remove('bg-white');
                }
            });
            
            // 滾動動畫
            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.1
            };
            
            const observer = new IntersectionObserver(function(entries) {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('animate-fade-in');
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);
            
            // 只觀察英雄區和聯絡區的元素，移除項目相關
            document.querySelectorAll('#hero > div > div, #contact > div > div').forEach(el => {
                observer.observe(el);
            });
        });
    </script>
</body>
</html>
